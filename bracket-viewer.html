<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bracket Comparison Tool</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f6f2;
        --surface: #ffffff;
        --border: #e2e0d8;
        --border-strong: #c8c5ba;
        --text: #1a1916;
        --text-2: #6b6860;
        --text-3: #9b9890;
        --live: #d44000;
        --live-bg: #fff4ef;
        --final-text: #9b9890;
        --upcoming: #1a6b3a;
        --east: #2d4a8a;
        --south: #8a2d2d;
        --west: #1a6b3a;
        --midwest: #6b3a1a;
        --bar1: #b8c4e8;
        --bar2: #b8dfc8;
        --pill1-bg: #eef1fa;
        --pill1-text: #2d4a8a;
        --pill2-bg: #edf7f2;
        --pill2-text: #1a6b3a;
        --font: "DM Sans", sans-serif;
        --mono: "DM Mono", monospace;
        --radius: 8px;
        --radius-lg: 12px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1.5rem 1rem 3rem;
      }
      .hd {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 0.25rem;
        flex-wrap: wrap;
        gap: 8px;
      }
      .hd h1 {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .hd-meta {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text-2);
      }
      .tabs {
        display: flex;
        gap: 2px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 1.5rem;
        margin-top: 1rem;
      }
      .tab {
        padding: 8px 18px;
        font-size: 13px;
        font-family: var(--font);
        cursor: pointer;
        border: none;
        background: none;
        border-bottom: 2px solid transparent;
        color: var(--text-2);
      }
      .tab.active {
        color: var(--text);
        border-bottom-color: var(--text);
        font-weight: 500;
      }
      .tab:hover:not(.active) {
        color: var(--text);
      }
      .round-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 1.25rem;
      }
      .rtab {
        font-size: 12px;
        font-family: var(--mono);
        padding: 4px 12px;
        border-radius: 99px;
        border: 1px solid var(--border-strong);
        cursor: pointer;
        background: transparent;
        color: var(--text-2);
      }
      .rtab.active {
        background: var(--text);
        color: #fff;
        border-color: var(--text);
      }
      .legend {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
      }
      .leg-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-family: var(--mono);
        color: var(--text-2);
      }
      .leg-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .bracket {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--border);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }
      .quadrant {
        background: var(--bg);
        padding: 1.25rem;
      }
      .q-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 1rem;
      }
      .q-label {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 3px 10px;
        border-radius: 99px;
      }
      .q-label.east {
        background: #eef1fa;
        color: var(--east);
      }
      .q-label.south {
        background: #faeeee;
        color: var(--south);
      }
      .q-label.west {
        background: #edf7f2;
        color: var(--west);
      }
      .q-label.midwest {
        background: #faf3ee;
        color: var(--midwest);
      }
      .q-label.national {
        background: #f5f0ff;
        color: #4a2d8a;
      }
      .game {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.75rem 1rem;
        margin-bottom: 8px;
      }
      .game:last-child {
        margin-bottom: 0;
      }
      .game.live {
        border-color: var(--live);
        background: var(--live-bg);
      }
      .game.final {
        opacity: 0.6;
      }
      .game-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        gap: 8px;
      }
      .game-name {
        font-size: 13px;
        font-weight: 500;
        flex: 1;
      }
      .game-pts {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-3);
        white-space: nowrap;
      }
      .game-time {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-3);
        white-space: nowrap;
      }
      .game-time.live-label {
        color: var(--live);
        font-weight: 500;
      }
      .game-time.upcoming-label {
        color: var(--upcoming);
      }
      .tbd-card {
        border: 1px dashed var(--border-strong);
        border-radius: var(--radius);
        padding: 0.85rem 1rem;
        margin-bottom: 8px;
        color: var(--text-3);
        font-family: var(--mono);
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .team-row {
        margin-bottom: 6px;
      }
      .team-row:last-child {
        margin-bottom: 0;
      }
      .team-label {
        font-size: 12px;
        color: var(--text-2);
        margin-bottom: 3px;
        display: flex;
        justify-content: space-between;
      }
      .team-label .seed {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-3);
      }
      .bar-bg {
        height: 20px;
        background: #f0efe9;
        border-radius: 4px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        display: flex;
        align-items: center;
        padding: 0 7px;
        font-size: 11px;
        font-family: var(--mono);
        font-weight: 500;
        white-space: nowrap;
        transition: width 0.4s ease;
      }
      .bar-fill.t1 {
        background: var(--bar1);
        color: var(--east);
      }
      .bar-fill.t2 {
        background: var(--bar2);
        color: var(--west);
      }
      .bar-fill.other {
        background: #e8e4d8;
        color: var(--text-2);
      }
      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        margin-top: 4px;
      }
      .pill {
        font-family: var(--mono);
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 99px;
        cursor: default;
      }
      .pill.t1 {
        background: var(--pill1-bg);
        color: var(--pill1-text);
      }
      .pill.t2 {
        background: var(--pill2-bg);
        color: var(--pill2-text);
      }
      .pill.other {
        background: #f0ede4;
        color: var(--text-2);
      }
      .pill .pts {
        opacity: 0.65;
        margin-left: 3px;
      }
      /* Person tab */
      .person-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 8px;
        margin-bottom: 1.5rem;
      }
      .pbtn {
        padding: 8px 12px;
        font-size: 13px;
        font-family: var(--font);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        cursor: pointer;
        color: var(--text);
        text-align: left;
      }
      .pbtn.active {
        background: var(--text);
        color: #fff;
        border-color: var(--text);
      }
      .pbtn:hover:not(.active) {
        background: var(--border);
      }
      .champ-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1rem 1.25rem;
        margin-bottom: 1.25rem;
      }
      .champ-label {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 4px;
      }
      .champ-pick {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .person-bracket {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--border);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }
      .person-quadrant {
        background: var(--bg);
        padding: 1rem 1.25rem;
      }
      .pq-header {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
      }
      .pq-header.east {
        color: var(--east);
      }
      .pq-header.south {
        color: var(--south);
      }
      .pq-header.west {
        color: var(--west);
      }
      .pq-header.midwest {
        color: var(--midwest);
      }
      .pick-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        gap: 8px;
      }
      .pick-row:last-child {
        border-bottom: none;
      }
      .pick-row.final .pick-val.correct {
        color: var(--upcoming);
        font-weight: 600;
      }
      .pick-row.final .pick-val.wrong {
        color: var(--south);
        text-decoration: line-through;
        opacity: 0.6;
      }
      .matchup-label {
        color: var(--text-2);
        font-size: 11px;
        font-family: var(--mono);
        flex-shrink: 0;
      }
      .pick-val {
        font-weight: 500;
        text-align: right;
      }
      .pick-pts {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-3);
        margin-left: 6px;
        white-space: nowrap;
      }
      .loading {
        text-align: center;
        padding: 3rem;
        color: var(--text-3);
        font-family: var(--mono);
        font-size: 13px;
      }
      /* Leaderboard */
      .lb-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }
      .lb-table th {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-3);
        padding: 10px 14px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }
      .lb-table th.right {
        text-align: right;
      }
      .lb-table td {
        padding: 11px 14px;
        font-size: 14px;
        border-bottom: 1px solid var(--border);
      }
      .lb-table tr:last-child td {
        border-bottom: none;
      }
      .lb-table tr.top td {
        font-weight: 600;
      }
      .lb-rank {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text-3);
        width: 32px;
      }
      .lb-name {
        font-weight: 500;
      }
      .lb-pts {
        font-family: var(--mono);
        text-align: right;
        font-size: 14px;
      }
      .lb-live {
        font-family: var(--mono);
        text-align: right;
        font-size: 13px;
        color: var(--live);
      }
      .lb-live.none {
        color: var(--text-3);
      }
      .lb-proj {
        font-family: var(--mono);
        text-align: right;
        font-size: 14px;
        font-weight: 500;
      }
      .lb-game-row {
        background: var(--bg);
      }
      .lb-game-row td {
        padding: 6px 14px 6px 32px;
        font-size: 12px;
        font-family: var(--mono);
        color: var(--text-2);
        border-bottom: 1px solid var(--border);
      }
      .live-badge {
        display: inline-block;
        background: var(--live);
        color: white;
        font-size: 10px;
        font-family: var(--mono);
        padding: 1px 6px;
        border-radius: 99px;
        margin-right: 6px;
        vertical-align: middle;
      }
      .error {
        text-align: center;
        padding: 2rem;
        color: var(--south);
        font-family: var(--mono);
        font-size: 13px;
        background: #faeeee;
        border-radius: var(--radius);
      }
      @media (max-width: 640px) {
        .bracket,
        .person-bracket {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="hd">
        <h1>Bracket Comparison Tool</h1>
        <span class="hd-meta" id="metaLine">loading…</span>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('bracket', this)">
          By game
        </button>
        <button class="tab" onclick="switchTab('person', this)">
          By person
        </button>
        <button class="tab" onclick="switchTab('leaderboard', this)">
          Leaderboard
        </button>
      </div>

      <div id="tab-bracket">
        <div class="round-tabs" id="roundTabs"></div>
        <div class="legend">
          <div class="leg-item">
            <div class="leg-dot" style="background: var(--live)"></div>
            Live
          </div>
          <div class="leg-item">
            <div class="leg-dot" style="background: var(--upcoming)"></div>
            Upcoming
          </div>
          <div class="leg-item">
            <div class="leg-dot" style="background: var(--border-strong)"></div>
            Final
          </div>
        </div>
        <div id="bracketView"><div class="loading">Loading picks…</div></div>
      </div>

      <div id="tab-person" style="display: none">
        <div class="person-grid" id="personGrid"></div>
        <div class="champ-card">
          <div class="champ-label">Champion pick</div>
          <div class="champ-pick" id="champPick">—</div>
        </div>
        <div id="personView"><div class="loading">Loading…</div></div>
      </div>

      <div id="tab-leaderboard" style="display: none">
        <div
          id="lbStatus"
          style="
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-3);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <span id="lbStatusText">Loading live scores…</span>
          <button
            onclick="refreshLeaderboard()"
            style="
              font-family: var(--mono);
              font-size: 11px;
              padding: 3px 10px;
              border: 1px solid var(--border-strong);
              border-radius: 99px;
              background: transparent;
              cursor: pointer;
              color: var(--text-2);
            "
          >
            ↻ Refresh
          </button>
        </div>
        <div id="lbView"><div class="loading">Loading…</div></div>
      </div>
    </div>

      const LIVE_MS = 2.5 * 60 * 60 * 1000; // just an estimate for ~2.5 hours after tipoff

      function gameStatus(slot, region) {
        const row = DATA.find((r) => r.slot === slot && r.region === region);
        const iso = row?.game_time;
        if (!iso)
          return { status: "upcoming", displayTime: "TBD", tipoff: null };
        const tipoff = new Date(iso);
        const now = new Date();
        const ms = now - tipoff;
        const status = ms < 0 ? "upcoming" : ms < LIVE_MS ? "live" : "final";
        const displayTime = tipoff.toLocaleString([], {
          weekday: "short",
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        });
        return { status, displayTime, tipoff };
      }

      // ── CSV parser ────────────────────────────────────────────────────────────────
      function parseCSV(text) {
        const lines = text
          .trim()
          .split("\n")
          .map((l) => l.split(",").map((c) => c.trim().replace(/^"|"$/g, "")));
        const headers = lines[0];
        const personStart = headers.indexOf("result") + 1;
        const people = headers.slice(personStart);
        const rows = lines.slice(1).map((r) => {
          const obj = {};
          headers.forEach((h, i) => (obj[h] = r[i] || ""));
          obj.round_num = parseInt(obj.round_num) || 0;
          obj.seed1 = parseInt(obj.seed1) || null;
          obj.seed2 = parseInt(obj.seed2) || null;
          obj.picks = {};
          people.forEach((p) => (obj.picks[p] = obj[p] || ""));
          return obj;
        });
        return { rows, people };
      }

      // ── Points helpers ────────────────────────────────────────────────────────────
      function potentialPts(roundNum, pickedTeam, rows) {
        const base = BASE_PTS[roundNum] || 0;
        if (!SEED_BONUS_ROUNDS.includes(roundNum)) return base;
        // find seed of picked team from R1 rows
        const r1 = rows.filter((r) => r.round_num === 1);
        for (const r of r1) {
          if (r.team1 === pickedTeam && r.seed1) return base + r.seed1;
          if (r.team2 === pickedTeam && r.seed2) return base + r.seed2;
        }
        return base;
      }

      function earnedPts(roundNum, pickedTeam, result, rows) {
        if (!result || pickedTeam !== result) return 0;
        return potentialPts(roundNum, pickedTeam, rows);
      }

      // ── State ─────────────────────────────────────────────────────────────────────
      let DATA = [],
        PEOPLE = [],
        activeRound = 1,
        activePerson = "";

      // ── Render: bracket tab ───────────────────────────────────────────────────────
      const ROUNDS = [
        { num: 1, label: "Round 1" },
        { num: 2, label: "Round 2" },
        { num: 3, label: "Sweet 16" },
        { num: 4, label: "Elite 8" },
        { num: 5, label: "Final Four" },
        { num: 6, label: "Championship" },
      ];

      const REGION_ORDER = ["East", "West", "South", "Midwest"];
      const REGION_CLS = {
        East: "east",
        South: "south",
        West: "west",
        Midwest: "midwest",
      };

      function buildRoundTabs() {
        const available = [...new Set(DATA.map((r) => r.round_num))];
        document.getElementById("roundTabs").innerHTML = ROUNDS.filter((r) =>
          available.includes(r.num),
        )
          .map(
            (r) =>
              `<button class="rtab${r.num === activeRound ? " active" : ""}" onclick="setRound(${r.num},this)">${r.label}</button>`,
          )
          .join("");
      }

      function setRound(num, el) {
        activeRound = num;
        document
          .querySelectorAll(".rtab")
          .forEach((x) => x.classList.remove("active"));
        el.classList.add("active");
        renderBracket();
      }

      function gameCard(row) {
        const { status, displayTime } = gameStatus(row.slot, row.region);
        const hasBothTeams = row.team1 && row.team2;
        const base = BASE_PTS[row.round_num] || 0;
        const seedBonus = SEED_BONUS_ROUNDS.includes(row.round_num)
          ? " + seed"
          : "";
        const ptsLabel = `${base}pts${seedBonus}`;

        if (!hasBothTeams) {
          return `<div class="tbd-card">
      <span>${row.slot}</span>
      <span>matchup TBD · ${ptsLabel}</span>
    </div>`;
        }

        const picks = row.picks;
        const t1p = Object.entries(picks)
          .filter(([, v]) => v === row.team1)
          .map(([k]) => k);
        const t2p = Object.entries(picks)
          .filter(([, v]) => v === row.team2)
          .map(([k]) => k);
        const otp = Object.entries(picks).filter(
          ([, v]) => v && v !== row.team1 && v !== row.team2,
        );
        const total = t1p.length + t2p.length + otp.length || 1;
        const t1pct = Math.round((t1p.length / total) * 100);
        const t2pct = Math.round((t2p.length / total) * 100);
        const otpct = 100 - t1pct - t2pct;

        const timeLabel =
          status === "live"
            ? `<span class="game-time live-label">● LIVE</span>`
            : status === "upcoming"
              ? `<span class="game-time upcoming-label">${displayTime}</span>`
              : `<span class="game-time">${displayTime} · Final</span>`;

        const seedLabel1 = row.seed1
          ? `<span class="seed">(${row.seed1})</span> `
          : "";
        const seedLabel2 = row.seed2
          ? `<span class="seed">(${row.seed2})</span> `
          : "";

        const pts1 = potentialPts(row.round_num, row.team1, DATA);
        const pts2 = potentialPts(row.round_num, row.team2, DATA);

        const pillHtml = (pickers, cls) =>
          pickers.map((p) => `<span class="pill ${cls}">${p}</span>`).join("");

        const otPillHtml = otp
          .map(([p, v]) => {
            const pts = potentialPts(row.round_num, v, DATA);
            return `<span class="pill other">${p}: ${v}</span>`;
          })
          .join("");

        return `<div class="game ${status === "live" ? "live" : status === "final" ? "final" : ""}">
    <div class="game-top">
      <div class="game-name">${seedLabel1}${row.team1} <span style="color:var(--text-3);font-weight:400">vs</span> ${seedLabel2}${row.team2}</div>
      ${timeLabel}
    </div>
    <div class="team-row">
      <div class="team-label">${row.team1} <span style="font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text)">+${pts1}pts</span></div>
      <div class="bar-bg"><div class="bar-fill t1" style="width:${t1pct}%">${t1pct > 10 ? t1pct + "%" : ""}</div></div>
      <div class="pills">${pillHtml(t1p, "t1")}</div>
    </div>
    <div class="team-row">
      <div class="team-label">${row.team2} <span style="font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text)">+${pts2}pts</span></div>
      <div class="bar-bg"><div class="bar-fill t2" style="width:${t2pct}%">${t2pct > 10 ? t2pct + "%" : ""}</div></div>
      <div class="pills">${pillHtml(t2p, "t2")}</div>
    </div>
    ${
      otp.length
        ? `<div class="team-row">
      <div class="team-label">Other</div>
      <div class="bar-bg"><div class="bar-fill other" style="width:${otpct}%">${otpct > 10 ? otpct + "%" : ""}</div></div>
      <div class="pills">${otPillHtml}</div>
    </div>`
        : ""
    }
  </div>`;
      }

      function renderBracket() {
        const roundRows = DATA.filter((r) => r.round_num === activeRound);
        const isFinalFour = activeRound === 5;
        const isChamp = activeRound === 6;

        let html = "";

        if (isChamp) {
          const row = roundRows[0];
          html = `<div style="max-width:500px;margin:0 auto">${row ? gameCard(row) : ""}</div>`;
        } else if (isFinalFour) {
          // Two games, show side by side
          const sorted = roundRows.sort(
            (a, b) =>
              ["East/South", "West/Midwest"].indexOf(a.region) -
              ["East/South", "West/Midwest"].indexOf(b.region),
          );
          html = `<div class="bracket">
      ${sorted
        .map(
          (r) => `<div class="quadrant">
        <div class="q-header"><span class="q-label national">${r.region}</span></div>
        ${gameCard(r)}
      </div>`,
        )
        .join("")}
    </div>`;
        } else {
          // Sort: live first, then upcoming by tipoff, then final — within each quadrant
          const STATUS_ORDER = { live: 0, upcoming: 1, final: 2 };
          html = `<div class="bracket">
      ${REGION_ORDER.map((region) => {
        const games = roundRows
          .filter((r) => r.region === region)
          .sort((a, b) => {
            const sa = gameStatus(a.slot, a.region),
              sb = gameStatus(b.slot, b.region);
            const so =
              (STATUS_ORDER[sa.status] ?? 3) - (STATUS_ORDER[sb.status] ?? 3);
            return so !== 0 ? so : (sa.tipoff || 0) - (sb.tipoff || 0);
          });
        return `<div class="quadrant">
          <div class="q-header"><span class="q-label ${REGION_CLS[region]}">${region}</span></div>
          ${games.map(gameCard).join("") || '<div class="tbd-card">Picks TBA</div>'}
        </div>`;
      }).join("")}
    </div>`;
        }

        document.getElementById("bracketView").innerHTML = html;
      }

      // ── Render: person tab ────────────────────────────────────────────────────────
      function buildPersonGrid() {
        document.getElementById("personGrid").innerHTML = PEOPLE.map(
          (p) =>
            `<button class="pbtn${p === activePerson ? " active" : ""}" onclick="setPerson('${p}',this)">${p}</button>`,
        ).join("");
      }

      function setPerson(p, el) {
        activePerson = p;
        document
          .querySelectorAll(".pbtn")
          .forEach((x) => x.classList.remove("active"));
        el.classList.add("active");
        renderPerson();
      }

      function renderPerson() {
        const p = activePerson;
        const champRow = DATA.find((r) => r.round_num === 6);
        document.getElementById("champPick").textContent =
          champRow?.picks[p] || "—";

        const PERSON_REGION_ORDER = [
          ["East", "West"],
          ["South", "Midwest"],
        ];

        let html = "";
        for (const pair of PERSON_REGION_ORDER) {
          html += `<div class="bracket" style="margin-bottom:1px">`;
          for (const region of pair) {
            html += `<div class="person-quadrant"><div class="pq-header ${region.toLowerCase()}">${region}</div>`;
            const regionRows = DATA.filter(
              (r) => r.region === region && r.round_num < 6,
            ).sort((a, b) => a.round_num - b.round_num);
            for (const row of regionRows) {
              const pick = row.picks[p];
              if (!pick) continue;
              const pts = potentialPts(row.round_num, pick, DATA);
              const result = row.result;
              const isCorrect = result && pick === result;
              const isWrong = result && pick !== result;
              const statusCls = result ? "final" : "";
              const pickCls = isCorrect ? "correct" : isWrong ? "wrong" : "";
              const roundLabel =
                ROUNDS.find((r) => r.num === row.round_num)?.label || "";
              html += `<div class="pick-row ${statusCls}">
          <span class="matchup-label">${roundLabel} · ${row.slot}</span>
          <span>
            <span class="pick-val ${pickCls}">${pick}</span>
            <span class="pick-pts pick-val ${pickCls}">+${pts}</span>
          </span>
        </div>`;
            }
            html += `</div>`;
          }
          html += `</div>`;
        }

        // Final Four rows
        const ffRows = DATA.filter((r) => r.round_num === 5);
        if (ffRows.some((r) => r.picks[p])) {
          html += `<div style="margin-top:1px;background:var(--border);border-radius:var(--radius-lg);overflow:hidden">
      <div class="person-quadrant" style="background:var(--bg)">
        <div class="pq-header" style="color:#4a2d8a">Final Four</div>`;
          for (const row of ffRows) {
            const pick = row.picks[p];
            if (!pick) continue;
            const pts = potentialPts(row.round_num, pick, DATA);
            html += `<div class="pick-row">
        <span class="matchup-label">${row.region}</span>
        <span><span class="pick-val">${pick}</span><span class="pick-pts">${pts}pt</span></span>
      </div>`;
          }
          html += `</div></div>`;
        }

        document.getElementById("personView").innerHTML = html;
      }

      // ── Tab switching ─────────────────────────────────────────────────────────────
      function switchTab(t, el) {
        document
          .querySelectorAll(".tab")
          .forEach((x) => x.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("tab-bracket").style.display =
          t === "bracket" ? "" : "none";
        document.getElementById("tab-person").style.display =
          t === "person" ? "" : "none";
        document.getElementById("tab-leaderboard").style.display =
          t === "leaderboard" ? "" : "none";
        if (t === "leaderboard") refreshLeaderboard();
      }

      // ── Leaderboard & live scores ─────────────────────────────────────────────────
      const ESPN_API =
        "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard";
      const REFRESH_INTERVAL = 60000;
      let lbTimer = null;
      let liveGames = [];

      function winProb(margin, minsLeft) {
        if (minsLeft <= 0) return margin > 0 ? 1 : margin < 0 ? 0 : 0.5;
        const x = (margin / Math.sqrt(minsLeft + 1)) * 1.5;
        return 1 / (1 + Math.exp(-x));
      }

      const TEAM_MAP = {
        "Mich. St.": "Michigan St.",
        "Michigan St.": "Michigan St.",
        MSU: "Michigan St.",
        "N. Dakota St.": "N. Dakota St.",
        NDSU: "N. Dakota St.",
        "N. Iowa": "N. Iowa",
        "Northern Iowa": "N. Iowa",
        UNI: "N. Iowa",
        "Miami (OH)": "Miami OH",
        "Mia (OH)": "Miami OH",
        CBU: "Cal Baptist",
        "Kennesaw St.": "Kennesaw St.",
        "Kennesaw State": "Kennesaw St.",
        "Tenn. St.": "Tenn. State",
        "Tennessee St.": "Tenn. State",
        "St. John's": "St. John's",
        SJU: "St. John's",
        PVAMU: "Prairie View",
        "Prairie View": "Prairie View",
        "Saint Mary's": "St. Mary's",
        "S. Florida": "South Florida",
        USF: "South Florida",
        "N. Carolina": "N. Carolina",
        UNC: "N. Carolina",
        "Iowa St.": "Iowa St.",
        "Iowa State": "Iowa St.",
        "Utah St.": "Utah St.",
        "Utah State": "Utah St.",
      };

      function normalizeTeam(name) {
        if (!name) return name;
        return TEAM_MAP[name] || name;
      }

      function computeEarned(person) {
        let total = 0;
        for (const row of DATA) {
          if (!row.result) continue;
          const pick = row.picks[person];
          if (!pick) continue;
          total += earnedPts(row.round_num, pick, row.result, DATA);
        }
        return total;
      }

      function computeLiveDelta(person, liveGamesList) {
        let delta = 0;
        for (const lg of liveGamesList) {
          const csvRow = DATA.find((r) => {
            const t1 = normalizeTeam(lg.team1Name);
            const t2 = normalizeTeam(lg.team2Name);
            return (
              (r.team1 === t1 && r.team2 === t2) ||
              (r.team1 === t2 && r.team2 === t1)
            );
          });
          if (!csvRow) continue;
          const pick = csvRow.picks[person];
          if (!pick) continue;
          const pts = potentialPts(csvRow.round_num, pick, DATA);
          const t1 = normalizeTeam(lg.team1Name);
          const prob =
            pick === t1
              ? lg.prob1
              : pick === normalizeTeam(lg.team2Name)
                ? lg.prob2
                : 0;
          delta += prob * pts;
        }
        return delta;
      }

      async function fetchLiveGames() {
        const resp = await fetch(ESPN_API);
        if (!resp.ok) throw new Error(`ESPN API ${resp.status}`);
        const data = await resp.json();
        const events = data?.events || [];
        const live = [];
        for (const event of events) {
          const status = event.status;
          if (status?.type?.state !== "in") continue;
          const comp = event.competitions?.[0];
          if (!comp) continue;
          const [c1, c2] = comp.competitors;
          if (!c1 || !c2) continue;
          const score1 = parseInt(c1.score) || 0;
          const score2 = parseInt(c2.score) || 0;
          const clock = status.displayClock || "";
          const period = status.period || 1;
          const [m, s] = clock.split(":").map(Number);
          let minsLeft = (m || 0) + (s || 0) / 60;
          if (period === 1) minsLeft += 20;
          if (period > 2) minsLeft = Math.min(minsLeft, 5);
          const margin = score1 - score2;
          const prob1 = winProb(margin, minsLeft);
          live.push({
            title: event.shortName || event.name,
            team1Name: c1.team?.shortDisplayName || c1.team?.displayName,
            team2Name: c2.team?.shortDisplayName || c2.team?.displayName,
            score1,
            score2,
            clock,
            period:
              period === 1
                ? "1st half"
                : period === 2
                  ? "2nd half"
                  : `OT${period - 2}`,
            prob1,
            prob2: 1 - prob1,
          });
        }
        return live;
      }

      async function refreshLeaderboard() {
        if (!DATA.length) return;
        const statusEl = document.getElementById("lbStatusText");
        statusEl.textContent = "Fetching live scores…";
        let corsError = false;
        try {
          liveGames = await fetchLiveGames();
          const now = new Date().toLocaleTimeString([], {
            hour: "numeric",
            minute: "2-digit",
          });
          statusEl.textContent =
            liveGames.length > 0
              ? `● ${liveGames.length} game${liveGames.length > 1 ? "s" : ""} live · updated ${now}`
              : `No live games · updated ${now}`;
        } catch (e) {
          corsError =
            e.message.includes("fetch") ||
            e.message.includes("CORS") ||
            e.message.includes("NetworkError");
          statusEl.textContent = corsError
            ? `⚠ ESPN API blocked — showing earned pts only`
            : `⚠ Could not fetch scores: ${e.message}`;
          liveGames = [];
        }
        renderLeaderboard(corsError);
        clearTimeout(lbTimer);
        if (liveGames.length > 0)
          lbTimer = setTimeout(refreshLeaderboard, REFRESH_INTERVAL);
      }

      function renderLeaderboard(corsError) {
        const hasLive = liveGames.length > 0;
        const rows = PEOPLE.map((person) => {
          const earned = computeEarned(person);
          const liveDelta = hasLive
            ? computeLiveDelta(person, liveGames)
            : null;
          const proj = liveDelta !== null ? earned + liveDelta : null;
          return { person, earned, liveDelta, proj };
        }).sort((a, b) => (b.proj ?? b.earned) - (a.proj ?? a.earned));

        let html = `<table class="lb-table"><thead><tr>
          <th class="lb-rank">#</th>
          <th>Player</th>
          <th class="right">Earned</th>
          ${hasLive ? `<th class="right">Live +</th><th class="right">Projected</th>` : ""}
        </tr></thead><tbody>`;

        rows.forEach(({ person, earned, liveDelta, proj }, i) => {
          const rank = i + 1;
          const liveStr = liveDelta !== null ? `+${liveDelta.toFixed(1)}` : "—";
          const projStr = proj !== null ? proj.toFixed(1) : "—";
          const liveClass = liveDelta !== null && liveDelta > 0 ? "" : "none";
          html += `<tr class="${rank === 1 ? "top" : ""}">
            <td class="lb-rank">${rank}</td>
            <td class="lb-name">${person}</td>
            <td class="lb-pts">${earned}</td>
            ${hasLive ? `<td class="lb-live ${liveClass}">${liveStr}</td><td class="lb-proj">${projStr}</td>` : ""}
          </tr>`;
          if (hasLive) {
            for (const lg of liveGames) {
              const csvRow = DATA.find((r) => {
                const t1 = normalizeTeam(lg.team1Name),
                  t2 = normalizeTeam(lg.team2Name);
                return (
                  (r.team1 === t1 && r.team2 === t2) ||
                  (r.team1 === t2 && r.team2 === t1)
                );
              });
              if (!csvRow) continue;
              const pick = csvRow.picks[person];
              if (!pick) continue;
              const pts = potentialPts(csvRow.round_num, pick, DATA);
              const t1 = normalizeTeam(lg.team1Name);
              const prob = pick === t1 ? lg.prob1 : 1 - lg.prob1;
              const exp = (prob * pts).toFixed(1);
              html += `<tr class="lb-game-row"><td colspan="${hasLive ? 5 : 3}">
                <span class="live-badge">LIVE</span>
                ${lg.score1}–${lg.score2} ${lg.period} ${lg.clock} · picked <strong>${pick}</strong> · ${Math.round(prob * 100)}% win · ${exp}pts expected
              </td></tr>`;
            }
          }
        });

        html += `</tbody></table>`;
        if (corsError)
          html += `<div style="margin-top:1rem;font-family:var(--mono);font-size:12px;color:var(--text-3);text-align:center">Live projections unavailable — ESPN API requires a CORS proxy. Showing earned points only.</div>`;
        document.getElementById("lbView").innerHTML = html;
      }

      // ── Load CSV ──────────────────────────────────────────────────────────────────
      async function loadData() {
        try {
          const resp = await fetch(CSV_URL);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const text = await resp.text();
          const { rows, people } = parseCSV(text);
          DATA = rows;
          PEOPLE = people;
          activePerson = people[0];

          // set active round to highest round with results + 1
          const roundsWithResults = [
            ...new Set(rows.filter((r) => r.result).map((r) => r.round_num)),
          ];
          const maxWithResult = roundsWithResults.length
            ? Math.max(...roundsWithResults)
            : 0;
          const availableRounds = [...new Set(rows.map((r) => r.round_num))];
          const maxAvailable = Math.max(...availableRounds);
          activeRound = Math.min(maxWithResult + 1, maxAvailable);

          const activeRoundLabel =
            ROUNDS.find((r) => r.num === activeRound)?.label || "Round 1";
          document.getElementById("metaLine").textContent =
            `${people.length} players · We're in ${activeRoundLabel}`;
          buildRoundTabs();
          renderBracket();
          buildPersonGrid();
          renderPerson();
        } catch (e) {
          document.getElementById("bracketView").innerHTML =
            `<div class="error">Could not load picks CSV: ${e.message}<br><br>Make sure bracket_picks.csv is in the same folder as this HTML file.</div>`;
        }
      }

      loadData();
    </script>
  </body>
</html>
